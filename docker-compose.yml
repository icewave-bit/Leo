services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: tutor_monitor
      POSTGRES_PASSWORD: tutor_monitor
      POSTGRES_DB: tutor_monitor
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    ports:
      - "5433:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutor_monitor -d tutor_monitor"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "${API_PORT:-3001}"
    environment:
      PORT: ${API_PORT:-3001}
      NODE_ENV: production
      DATABASE_URL: postgresql://tutor_monitor:tutor_monitor@postgres:5432/tutor_monitor
      SESSION_SECRET: change-me-to-a-long-random-string
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      CORS_ORIGIN: ${CORS_ORIGIN}
      NBRB_API_URL: https://api.nbrb.by
      BOT_API_TOKEN: ${BOT_API_TOKEN:-change-me-to-a-long-random-bot-token}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - proxy
    labels:
      - traefik.enable=true
      - "traefik.docker.network=${TRAEFIK_DOCKER_NETWORK:-proxy}"
      - "traefik.http.routers.tutor-monitor-api.rule=Host(`${APP_HOST}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.tutor-monitor-api.entrypoints=web-secure"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  leo-bot:
    profiles: ["bot"]
    build:
      context: ./bot
      dockerfile: Dockerfile
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TUTOR_MONITOR_API_URL: http://server:${API_PORT:-3001}
      BOT_API_TOKEN: ${BOT_API_TOKEN:-change-me-to-a-long-random-bot-token}
      POLL_INTERVAL: ${POLL_INTERVAL:-1m}
    depends_on:
      server:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_PUBLIC_ORIGIN: ${VITE_PUBLIC_ORIGIN:-https://leo.super.net.by}
    expose:
      - "80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-}
      VITE_PUBLIC_ORIGIN: ${VITE_PUBLIC_ORIGIN:-}
      SERVER_FALLBACK_PAGE: /public/index.html
      SERVER_ERROR_PAGE_404: /public/index.html
    depends_on:
      server:
        condition: service_healthy
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.tutor-monitor-web.rule=Host(`${APP_HOST}`)"
      - "traefik.http.routers.tutor-monitor-web.entrypoints=web-secure"
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  internal:
  proxy:
    external:
      name: ${TRAEFIK_DOCKER_NETWORK:-proxy}
