services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: tutor_monitor
      POSTGRES_PASSWORD: tutor_monitor
      POSTGRES_DB: tutor_monitor
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutor_monitor -d tutor_monitor"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://tutor_monitor:tutor_monitor@postgres:5432/tutor_monitor
      SESSION_SECRET: change-me-to-a-long-random-string
      COOKIE_SECURE: "false"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://127.0.0.1:8080}
      NBRB_API_URL: https://api.nbrb.by
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://127.0.0.1:3001}
      SERVER_FALLBACK_PAGE: /public/index.html
      SERVER_ERROR_PAGE_404: /public/index.html
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres_data:
